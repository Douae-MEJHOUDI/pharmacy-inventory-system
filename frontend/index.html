<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Inventory Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #16a34a;
            --primary-hover: #15803d;
            --primary-light: #dcfce7;
            --primary-muted: #86efac;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --sidebar-active: #16a34a;
            --sidebar-text: #94a3b8;
            --sidebar-text-active: #f1f5f9;
            --bg: #f8fafc;
            --bg-subtle: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --border-focus: #16a34a;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --transition: all 0.18s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ─────────────────────────────── */
        .sidebar {
            width: 256px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.04);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        .logo {
            padding: 22px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 11px;
            text-decoration: none;
        }

        .logo img {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            object-fit: cover;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .logo-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.01em;
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: #475569;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
        }

        .nav-section-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #334155;
            padding: 8px 10px 4px;
            margin-top: 4px;
        }

        .menu-item {
            padding: 9px 12px;
            margin: 2px 0;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--sidebar-text);
            user-select: none;
        }

        .menu-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .menu-item:hover {
            background: var(--sidebar-hover);
            color: #cbd5e1;
        }

        .menu-item.active {
            background: rgba(22, 163, 74, 0.15);
            color: #4ade80;
        }

        .menu-item.active svg {
            opacity: 1;
        }

        .user-info {
            padding: 14px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-info .user-name {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 0.85rem;
        }

        .user-info .user-role {
            color: #475569;
            font-size: 0.75rem;
        }

        .user-info button {
            margin-top: 10px;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            font-family: inherit;
        }

        .user-info button:hover {
            background: rgba(239, 68, 68, 0.18);
        }

        /* ── Main Content ─────────────────────────── */
        .main-content {
            margin-left: 256px;
            flex: 1;
            padding: 32px 36px;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .page-header p {
            color: var(--text-muted);
            margin-top: 4px;
            font-size: 0.875rem;
        }

        /* ── Cards ────────────────────────────────── */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .stat-card.primary::before { background: #16a34a; }
        .stat-card.success::before { background: #0ea5e9; }
        .stat-card.warning::before { background: #f59e0b; }
        .stat-card.danger::before  { background: #ef4444; }

        .stat-value {
            font-size: 1.875rem;
            font-weight: 700;
            margin: 8px 0 4px;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stat-card.primary .stat-value { color: #16a34a; }
        .stat-card.success .stat-value { color: #0ea5e9; }
        .stat-card.warning .stat-value { color: #d97706; }
        .stat-card.danger .stat-value  { color: #ef4444; }

        /* ── Buttons ──────────────────────────────── */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            line-height: 1;
            white-space: nowrap;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 1px 3px rgba(22,163,74,0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 10px rgba(22,163,74,0.35);
        }

        .btn-success {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 1px 3px rgba(14,165,233,0.3);
        }

        .btn-success:hover {
            background: #0284c7;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            box-shadow: 0 1px 3px rgba(239,68,68,0.25);
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: var(--bg-subtle);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* ── Forms ────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.83rem;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--text);
            background: var(--card-bg);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        /* ── Tables ───────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 11px 14px;
            text-align: left;
        }

        th {
            background: var(--bg-subtle);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 0.875rem;
        }

        tr:last-child td { border-bottom: none; }

        tbody tr {
            transition: background 0.12s;
        }

        tbody tr:hover td {
            background: var(--bg-subtle);
        }

        /* ── Badges ───────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-warning { background: #fef9c3; color: #92400e; }
        .badge-danger  { background: #fee2e2; color: #b91c1c; }
        .badge-info    { background: #e0f2fe; color: #0369a1; }

        /* ── Login Screen ─────────────────────────── */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--sidebar-bg);
            background-image: radial-gradient(ellipse at 30% 50%, rgba(22,163,74,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 20%, rgba(14,165,233,0.06) 0%, transparent 50%);
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            margin-bottom: 6px;
            color: var(--text);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .login-box .login-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 28px;
        }

        /* ── Alerts ───────────────────────────────── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 18px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .alert-success {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        .alert-danger {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        /* ── Upload Area ──────────────────────────── */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-subtle);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f0fdf4;
        }

        /* ── Search Box ───────────────────────────── */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--text);
            background: var(--card-bg);
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
        }

        /* ── Modal ────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.55);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .modal h3 {
            margin-bottom: 20px;
            color: var(--text);
            font-weight: 700;
            font-size: 1rem;
        }

        /* ── Misc ─────────────────────────────────── */
        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.75s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* ── Filter / Tab Buttons ─────────────────── */
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ── Dividers & misc helpers ──────────────── */
        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        select.form-control {
            cursor: pointer;
        }

        /* ── Responsive ───────────────────────────── */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .main-content {
                margin-left: 0;
                padding: 20px 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .two-column {
                grid-template-columns: 1fr;
            }
        }

        /* ── Print ────────────────────────────────── */
        @media print {
            @page { margin: 1cm; size: A4; }

            body { background: white; }

            .sidebar { display: none; }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .btn, .menu-item { display: none !important; }

            .page-header {
                border-bottom: 2px solid #16a34a;
                padding-bottom: 14px;
                margin-bottom: 20px;
            }

            .stats-grid {
                page-break-inside: avoid;
                border: 1px solid #ddd;
                padding: 14px;
                margin-bottom: 20px;
                border-radius: 6px;
            }

            .stat-card {
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }

            .card {
                page-break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
                margin-bottom: 20px;
            }

            table { border-collapse: collapse; font-size: 0.85rem; }

            th {
                background: #16a34a !important;
                color: white !important;
                padding: 8px !important;
                border: 1px solid #ddd;
            }

            td {
                padding: 8px !important;
                border: 1px solid #ddd;
            }

            tr:nth-child(even) { background: #f9f9f9; }

            .badge { border: 1px solid #333; padding: 2px 6px; }

            .print-header {
                display: block !important;
                text-align: center;
                margin-bottom: 28px;
                padding-bottom: 14px;
                border-bottom: 2px solid #16a34a;
            }

            .print-footer {
                display: block !important;
                margin-top: 28px;
                padding-top: 14px;
                border-top: 1px solid #ddd;
                text-align: center;
                font-size: 0.8rem;
                color: #666;
            }
        }

        .print-header, .print-footer { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_URL = 'http://localhost:5001/api';

        // Login Screen Component
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        onLogin(data.user);
                    } else {
                        setError('Invalid username or password');
                    }
                } catch (err) {
                    setError('Failed to connect to server');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="login-container">
                    <div className="login-box">
                        <div style={{textAlign: 'center', marginBottom: '24px'}}>
                            <img src="logo.png" alt="Logo" style={{width: '60px', height: '60px', borderRadius: '12px', marginBottom: '14px'}} />
                        </div>
                        <h2>Welcome back</h2>
                        <p className="login-subtitle">Sign in to PharmaSys</p>
                        {error && <div className="alert alert-danger">{error}</div>}
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Username</label>
                                <input
                                    type="text"
                                    className="form-control"
                                    placeholder="Enter your username"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>Password</label>
                                <input
                                    type="password"
                                    className="form-control"
                                    placeholder="Enter your password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button type="submit" className="btn btn-primary" style={{width: '100%', padding: '10px', marginTop: '4px'}} disabled={loading}>
                                {loading ? 'Signing in...' : 'Sign in'}
                            </button>
                        </form>
                        <p style={{marginTop: '16px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.8rem'}}>
                            Default credentials: admin / admin123
                        </p>
                    </div>
                </div>
            );
        }

        // Dashboard Component
        function Dashboard({ onNavigate }) {
            const [stats, setStats] = useState(null);
            const [expiringItems, setExpiringItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    const [statsRes, expiringRes] = await Promise.all([
                        fetch(`${API_URL}/dashboard/stats`, { credentials: 'include' }),
                        fetch(`${API_URL}/inventory/expiring/30`, { credentials: 'include' })
                    ]);

                    const statsData = await statsRes.json();
                    const expiringData = await expiringRes.json();

                    setStats(statsData.stats);
                    setExpiringItems(expiringData.items || []);
                } catch (err) {
                    console.error('Error loading dashboard:', err);
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return <div className="loading"><div className="spinner"></div>Loading dashboard...</div>;
            }

            return (
                <div>
                    <div className="print-header">
                        <h1 style={{color: '#16a34a', marginBottom: '10px'}}>PHARMACY INVENTORY REPORT</h1>
                        <p style={{fontSize: '1.1rem', margin: '5px 0'}}>PharmaSys Management System</p>
                        <p style={{fontSize: '0.9rem', color: '#666'}}>Generated on: {new Date().toLocaleString()}</p>
                    </div>

                    <div className="page-header">
                        <h1>Dashboard</h1>
                        <p>Overview of your pharmacy inventory</p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card primary">
